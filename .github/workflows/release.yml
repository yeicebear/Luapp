name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build QBE
        run: make -C qbe

      - name: Build Lua
        run: |
          cd lua-5.4.7
          make linux

      - name: Build lpp
        run: |
          cd lua-5.4.7
          ./src/luac -o ../lpp.luac ../src/main.lua
          gcc -o ../lpp ../src/main.luastatic.c ../src/runtime.c -I src -L src -llua -lm -ldl
          cd ..

      - name: Package
        run: |
          mkdir -p dist
          cp lpp dist/
          cp qbe/qbe dist/
          cp src/runtime.c dist/
          cd dist
          tar -czf lpp-linux-x86_64.tar.gz lpp qbe runtime.c

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/lpp-linux-x86_64.tar.gz
