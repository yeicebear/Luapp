name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps (dependencies and shi)
        run: sudo apt-get install -y musl-tools lua5.4 luarocks
      - name: Install luastatic
        run: sudo luarocks install luastatic
      - name: Build QBE (Quick Backend, required for compilation ;-;)
        run: make -C qbe
      - name: Build Lua (W)
        run: make -C lua-5.4.7 linux CC=musl-gcc
      - name: Build lpp
        run: |
          cd src
          CC="musl-gcc -I../lua-5.4.7/src" luastatic main.lua lexer.lua parser.lua analyze.lua codegen.lua ../lua-5.4.7/src/liblua.a
          cd ..
          musl-gcc -static -o lpp src/main.luastatic.c src/runtime.c \
            -Ilua-5.4.7/src lua-5.4.7/src/liblua.a -lm -ldl
      - name: Package
        run: |
          mkdir -p dist
          cp lpp dist/
          cp qbe/obj/qbe dist/
          cp src/runtime.c        dist/
          cp src/stdlib.c         dist/
          cp src/stdlib.lpplib    dist/
          cp src/gamelib.c        dist/
          cp src/gamelib.lpplib   dist/
          cp src/mathlib.c        dist/
          cp src/mathlib.lpplib   dist/
          cp src/threadlib.c      dist/
          cp src/threadlib.lpplib dist/
          cp src/netlib.c         dist/
          cp src/netlib.lpplib    dist/
          cp src/ailib.c          dist/
          cp src/ailib.lpplib     dist/
          tar -czf lpp-linux-x86_64.tar.gz -C dist .
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: lpp-linux-x86_64.tar.gz
      - name: Upload main.luastatic.c
        uses: actions/upload-artifact@v4
        with:
          name: luastatic-c
          path: src/main.luastatic.c

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew install lua luarocks
      - name: Install luastatic
        run: luarocks install luastatic
      - name: Build QBE
        run: make -C qbe
      - name: Build Lua
        run: |
          cd lua-5.4.7/src
          clang -std=gnu99 -O2 -DLUA_COMPAT_5_3 -DLUA_USE_MACOSX -c *.c
          rm -f lua.o luac.o
          libtool -static -o liblua.a *.o
      - name: Build lpp but macOS :(
        run: |
          sudo mkdir -p /usr/local/include
          sudo cp lua-5.4.7/src/*.h /usr/local/include/
          cd src
          luastatic main.lua lexer.lua parser.lua analyze.lua codegen.lua ../lua-5.4.7/src/liblua.a
          cd ..
          clang -o lpp src/main.luastatic.c src/runtime.c \
            -Ilua-5.4.7/src lua-5.4.7/src/liblua.a -lm
      - name: Package
        run: |
          mkdir -p dist
          cp lpp dist/
          cp qbe/obj/qbe dist/
          cp src/runtime.c        dist/
          cp src/stdlib.c         dist/
          cp src/stdlib.lpplib    dist/
          cp src/gamelib.c        dist/
          cp src/gamelib.lpplib   dist/
          cp src/mathlib.c        dist/
          cp src/mathlib.lpplib   dist/
          cp src/threadlib.c      dist/
          cp src/threadlib.lpplib dist/
          cp src/netlib.c         dist/
          cp src/netlib.lpplib    dist/
          cp src/ailib.c          dist/
          cp src/ailib.lpplib     dist/
          tar -czf lpp-darwin-arm64.tar.gz -C dist .
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: lpp-darwin-arm64.tar.gz

  build-windows:
    runs-on: windows-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - name: Install MSYS2 for windooo
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            make
            git
            zip
      - name: Download main.luastatic.c from linux build
        uses: actions/download-artifact@v4
        with:
          name: luastatic-c
          path: src/
      - name: Build QBE windooo
        shell: msys2 {0}
        run: make -C qbe
      - name: Build Lua windooo
        shell: msys2 {0}
        run: make -C lua-5.4.7 mingw
      - name: Build lpp windooo
        shell: msys2 {0}
        run: |
          gcc -o lpp.exe src/main.luastatic.c src/runtime.c \
            -Ilua-5.4.7/src lua-5.4.7/src/liblua.a -lm
      - name: Package
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp lpp.exe               dist/
          cp qbe/obj/qbe.exe       dist/
          cp src/runtime.c         dist/
          cp src/stdlib.c          dist/
          cp src/stdlib.lpplib     dist/
          cp src/gamelib.c         dist/
          cp src/gamelib.lpplib    dist/
          cp src/mathlib.c         dist/
          cp src/mathlib.lpplib    dist/
          cp src/threadlib.c       dist/
          cp src/threadlib.lpplib  dist/
          cp src/netlib.c          dist/
          cp src/netlib.lpplib     dist/
          cp src/ailib.c           dist/
          cp src/ailib.lpplib      dist/
          cp install.bat           dist/
          cd dist
          zip ../lpp-windows-x86_64.zip ./*
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: lpp-windows-x86_64.zip
