name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install musl
        run: sudo apt-get install -y musl-tools
      - name: Build QBE
        run: make -C qbe
      - name: Build Lua
        run: make -C lua-5.4.7 linux CC=musl-gcc
      - name: Build lpp
        run: |
          cd src
          luastatic main.lua lexer.lua parser.lua analyze.lua codegen.lua ../lua-5.4.7/src/liblua.a
          cd ..
          musl-gcc -static -o lpp src/main.luastatic.c src/runtime.c \
            -Ilua-5.4.7/src lua-5.4.7/src/liblua.a -lm -ldl
      - name: Package
        run: |
          mkdir -p dist
          cp lpp dist/
          cp qbe/obj/qbe dist/
          cp src/runtime.c dist/
          cp src/stdlib.c dist/
          cp src/gamelib.c dist/
          tar -czf lpp-linux-x86_64.tar.gz -C dist lpp qbe runtime.c stdlib.c gamelib.c
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: lpp-linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build QBE
        run: make -C qbe
      - name: Build Lua
        run: |
          cd lua-5.4.7/src
          clang -std=gnu99 -O2 -DLUA_COMPAT_5_3 -DLUA_USE_MACOSX -c *.c
          rm -f lua.o luac.o
          libtool -static -o liblua.a *.o
      - name: Build lpp
        run: |
          cd src
          luastatic main.lua lexer.lua parser.lua analyze.lua codegen.lua ../lua-5.4.7/src/liblua.a
          cd ..
          clang -o lpp src/main.luastatic.c src/runtime.c \
            -Ilua-5.4.7/src lua-5.4.7/src/liblua.a -lm
      - name: Package
        run: |
          mkdir -p dist
          cp lpp dist/
          cp qbe/obj/qbe dist/
          cp src/runtime.c dist/
          cp src/stdlib.c dist/
          cp src/gamelib.c dist/
          tar -czf lpp-darwin-arm64.tar.gz -C dist lpp qbe runtime.c stdlib.c gamelib.c
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: lpp-darwin-arm64.tar.gz
